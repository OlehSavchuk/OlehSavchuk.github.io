- name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 1. Add Node.js setup so npm packages/Preact can be resolved
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Install TailwindCSS CLI locally or globally so Hugo can find it
      - name: Install TailwindCSS CLI
        run: |
          npm install -D @tailwindcss/cli
          # Alternatively, ensure npx can resolve it, or download the binary if needed.
          # To make the binary accessible in PATH:
          sudo npm install -g @tailwindcss/cli

      - name: Build with Hugo
        run: hugo --gc --minify
